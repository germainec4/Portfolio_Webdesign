  <script>
    document.addEventListener("DOMContentLoaded", function () {
      const bodyEl = document.body;

      function lockScroll() {
        bodyEl.style.overflow = "hidden";
      }

      function unlockScroll() {
        // remettre à la valeur par défaut
        bodyEl.style.overflow = "";
      }

      // Tous les boutons qui ouvrent un pop-up
      document.querySelectorAll(".js-open-popup").forEach(function (btn) {
        btn.addEventListener("click", function () {
          lockScroll();
        });
      });

      // Tous les éléments qui ferment un pop-up (croix, overlay, etc.)
      document.querySelectorAll(".js-close-popup").forEach(function (el) {
        el.addEventListener("click", function () {
          // petit delay pour laisser l'anim Webflow finir si besoin
          setTimeout(unlockScroll, 200);
        });
      });
    });
  </script>

  <script>
    document.addEventListener('DOMContentLoaded', function () {
      var wrapper = document.querySelector('.logo-eyes-wrapper');
      if (!wrapper) return;

      var pupils = wrapper.querySelectorAll('.pupil');
      var threshold = 700; // distance en px autour du logo
      var maxMove = 3.2;   // amplitude subtile pour ne pas sortir de l'œil
      var isActive = false;

      // Quand l'animation de clignement est finie, on enlève la classe
      wrapper.addEventListener('animationend', function (e) {
        if (e.target.classList.contains('eye-ball')) {
          wrapper.classList.remove('eyes-blink');
        }
      }, true);

      document.addEventListener('mousemove', function (e) {
        var rect = wrapper.getBoundingClientRect();
        var centerX = rect.left + rect.width / 2;
        var centerY = rect.top + rect.height / 2;

        var dx = e.clientX - centerX;
        var dy = e.clientY - centerY;
        var distance = Math.sqrt(dx * dx + dy * dy);

        if (distance < threshold) {
          // Activation des yeux (on montre le globe blanc + clignement)
          if (!isActive) {
            isActive = true;
            wrapper.classList.add('eyes-active');

            // recentre les pupilles
            pupils.forEach(function (pupil) {
              pupil.style.transform = 'translate(-50%, -50%)';
            });

            // lance un clignement
            wrapper.classList.remove('eyes-blink');
            void wrapper.offsetWidth; // reflow
            wrapper.classList.add('eyes-blink');
          }

          // Calcul de la direction vers la souris
          var angle = Math.atan2(dy, dx);
          var offsetX = Math.cos(angle) * maxMove;
          var offsetY = Math.sin(angle) * maxMove;

          pupils.forEach(function (pupil) {
            pupil.style.transform =
              'translate(calc(50% + ' + offsetX + 'px), calc(50% + ' + offsetY + 'px))';
          });

        } else {
          // Souris loin : on revient au logo normal
          if (isActive) {
            isActive = false;
            wrapper.classList.remove('eyes-active');
            wrapper.classList.remove('eyes-blink');

            pupils.forEach(function (pupil) {
              pupil.style.transform = 'translate(-50%, -50%)';
            });
          }
        }
      });
    });
  </script>

  <script>
    document.addEventListener("DOMContentLoaded", () => {
      // --- VARIABLES GLOBALES PARTAGÉES ---
      // Respecte les préférences d’accessibilité
      const reduceMotion = window.matchMedia("(prefers-reduced-motion: reduce)").matches;
      // Lettres utilisées pendant le scramble
      const CHARS = "ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789";


      // --- 1. ANIMATION SCRAMBLE DU TITRE HERO ---
      const titleEl = document.querySelector(".hero_title-dynamic");
      const scrambleCards = document.querySelectorAll("[data-title]");
      const defaultHTML = titleEl ? titleEl.innerHTML : "";
      const defaultTitle = "CLEMENT GERMAINE";

      if (titleEl && scrambleCards.length) {
        let heroRafId = null;
        let originalHeight = null;

        function scrambleTo(finalText, { duration = 300, fps = 60, settle = 0.35 } = {}) {
          if (!originalHeight) {
            originalHeight = titleEl.getBoundingClientRect().height;
            titleEl.style.minHeight = originalHeight + "px";
          }
          if (reduceMotion) {
            if (finalText === defaultTitle && defaultHTML) {
              titleEl.innerHTML = defaultHTML;
            } else {
              titleEl.textContent = finalText;
            }
            return;
          }

          if (heroRafId) cancelAnimationFrame(heroRafId);

          const startText = titleEl.textContent;
          const startTime = performance.now();
          const maxLen = Math.max(startText.length, finalText.length);
          const paddedFinal = finalText.padEnd(maxLen, " ");

          function tick(now) {
            const elapsed = now - startTime;
            const t = Math.min(elapsed / duration, 1);
            const lockCount = Math.floor(maxLen * Math.max(0, (t - (1 - settle)) / settle));

            let out = "";
            for (let i = 0; i < maxLen; i++) {
              if (i < lockCount) {
                out += paddedFinal[i];
              } else {
                out += (paddedFinal[i] === " ")
                  ? " "
                  : CHARS[Math.floor(Math.random() * CHARS.length)];
              }
            }

            titleEl.textContent = out;

            if (t < 1) {
              heroRafId = requestAnimationFrame(tick);
            } else {
              if (finalText === defaultTitle && defaultHTML) {
                titleEl.innerHTML = defaultHTML;
              } else {
                titleEl.textContent = finalText;
              }
              heroRafId = null;
            }
          }

          titleEl.style.willChange = "contents";
          titleEl.style.fontVariantLigatures = "none";
          heroRafId = requestAnimationFrame(tick);
        }

        scrambleCards.forEach((card) => {
          const t = (card.getAttribute("data-title") || "").trim();
          if (!t) return;

          card.addEventListener("mouseenter", () => scrambleTo(t, { duration: 520 }));
          card.addEventListener("mouseleave", () => scrambleTo(defaultTitle, { duration: 420 }));
          card.addEventListener("focusin", () => scrambleTo(t, { duration: 520 }));
          card.addEventListener("focusout", () => scrambleTo(defaultTitle, { duration: 420 }));
        });
      }


      // --- 2. GESTION DES ÉTATS DES CARTES PROJETS (Active/Dimmed) ---
      const projectCards = document.querySelectorAll(".project_card");

      if (projectCards.length) {
        const clearStates = () => {
          projectCards.forEach(c => {
            c.classList.remove("is-active");
            c.classList.remove("is-dimmed");
          });
        };

        projectCards.forEach((card) => {
          const activate = () => {
            projectCards.forEach(c => {
              c.classList.toggle("is-active", c === card);
              c.classList.toggle("is-dimmed", c !== card);
            });
          };

          card.addEventListener("mouseenter", activate);
          card.addEventListener("mouseleave", clearStates);
          card.addEventListener("focusin", activate);
          card.addEventListener("focusout", clearStates);
        });
      }


      // --- 3. SCRAMBLE DES LIENS DE NAVIGATION ---
      const links = document.querySelectorAll('[data-scramble="true"]');

      if (links.length && !reduceMotion) {
        links.forEach((el) => {
          const original = el.textContent;
          el.dataset.originalText = original;
          let linkRafId = null;

          function scramble(duration = 220) {
            if (linkRafId) cancelAnimationFrame(linkRafId);

            const finalText = el.dataset.originalText;
            const startTime = performance.now();
            const maxLen = finalText.length;

            if (!el.dataset.lockWidth) {
              const w = el.getBoundingClientRect().width;
              el.style.display = "inline-block";
              el.style.minWidth = w + "px";
              el.dataset.lockWidth = "true";
            }

            function tick(now) {
              const t = Math.min((now - startTime) / duration, 1);
              const lockCount = Math.floor(maxLen * t);

              let out = "";
              for (let i = 0; i < maxLen; i++) {
                if (i < lockCount) out += finalText[i];
                else {
                  const c = finalText[i];
                  if (c === " " || c === "[" || c === "]") out += c;
                  else out += CHARS[(Math.random() * CHARS.length) | 0];
                }
              }

              el.textContent = out;

              if (t < 1) {
                linkRafId = requestAnimationFrame(tick);
              } else {
                el.textContent = finalText;
                linkRafId = null;
              }
            }

            linkRafId = requestAnimationFrame(tick);
          }

          el.addEventListener("mouseenter", () => scramble(220));
          el.addEventListener("focus", () => scramble(220));

          el.addEventListener("mouseleave", () => {
            if (linkRafId) cancelAnimationFrame(linkRafId);
            el.textContent = el.dataset.originalText;
          });
          el.addEventListener("blur", () => {
            if (linkRafId) cancelAnimationFrame(linkRafId);
            el.textContent = el.dataset.originalText;
          });
        });
      }
    });
  </script>
