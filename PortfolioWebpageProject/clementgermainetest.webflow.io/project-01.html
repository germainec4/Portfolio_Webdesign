<script>
document.addEventListener('DOMContentLoaded', function () {
  var wrapper = document.querySelector('.logo-eyes-wrapper');
  if (!wrapper) return;

  var pupils = wrapper.querySelectorAll('.pupil');
  var threshold = 700; // distance en px autour du logo
  var maxMove = 3.2;   // amplitude subtile pour ne pas sortir de l'œil
  var isActive = false;

  // Quand l'animation de clignement est finie, on enlève la classe
  wrapper.addEventListener('animationend', function (e) {
    if (e.target.classList.contains('eye-ball')) {
      wrapper.classList.remove('eyes-blink');
    }
  }, true);

  document.addEventListener('mousemove', function (e) {
    var rect = wrapper.getBoundingClientRect();
    var centerX = rect.left + rect.width / 2;
    var centerY = rect.top + rect.height / 2;

    var dx = e.clientX - centerX;
    var dy = e.clientY - centerY;
    var distance = Math.sqrt(dx * dx + dy * dy);

    if (distance < threshold) {
      // Activation des yeux (on montre le globe blanc + clignement)
      if (!isActive) {
        isActive = true;
        wrapper.classList.add('eyes-active');

        // recentre les pupilles
        pupils.forEach(function (pupil) {
          pupil.style.transform = 'translate(-50%, -50%)';
        });

        // lance un clignement
        wrapper.classList.remove('eyes-blink');
        void wrapper.offsetWidth; // reflow
        wrapper.classList.add('eyes-blink');
      }

      // Calcul de la direction vers la souris
      var angle = Math.atan2(dy, dx);
      var offsetX = Math.cos(angle) * maxMove;
      var offsetY = Math.sin(angle) * maxMove;

      pupils.forEach(function (pupil) {
        pupil.style.transform =
          'translate(calc(50% + ' + offsetX + 'px), calc(50% + ' + offsetY + 'px))';
      });

    } else {
      // Souris loin : on revient au logo normal
      if (isActive) {
        isActive = false;
        wrapper.classList.remove('eyes-active');
        wrapper.classList.remove('eyes-blink');

        pupils.forEach(function (pupil) {
          pupil.style.transform = 'translate(-50%, -50%)';
        });
      }
    }
  });
});
</script>

<script>
  document.addEventListener("DOMContentLoaded", () => {
    console.log("🚀 Lancement du script global (MODE TERMINATOR)...");

    const reduceMotion = window.matchMedia("(prefers-reduced-motion: reduce)").matches;
    const CHARS = "ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789";
    const DIGITS = "0123456789";

    function getTextNodes(element) {
      const textNodes = [];
      const walker = document.createTreeWalker(element, NodeFilter.SHOW_TEXT, null, false);
      let node;
      while (node = walker.nextNode()) {
        if (node.nodeValue.trim() !== "") {
          textNodes.push({ node: node, original: node.nodeValue });
        }
      }
      return textNodes;
    }

    // --- 1. HERO ---
    try {
      const titleEl = document.querySelector(".hero_title-dynamic");
      const scrambleCards = document.querySelectorAll("[data-title]");
      if (titleEl && scrambleCards.length) {
        const defaultTitleHTML = titleEl.innerHTML;
        const defaultTitleText = titleEl.textContent.trim() || "CLÉMENT GERMAINE";
        let heroRafId = null;
        function scrambleTo(finalText, { duration = 300, settle = 0.35, isReverting = false } = {}) {
          if (reduceMotion) { titleEl.innerHTML = isReverting ? defaultTitleHTML : finalText; return; }
          if (heroRafId) cancelAnimationFrame(heroRafId);
          const startText = titleEl.textContent;
          const startTime = performance.now();
          const maxLen = Math.max(startText.length, finalText.length);
          const paddedFinal = finalText.padEnd(maxLen, " ");
          function tick(now) {
            const t = Math.min((now - startTime) / duration, 1);
            const lockCount = Math.floor(maxLen * Math.max(0, (t - (1 - settle)) / settle));
            let out = "";
            for (let i = 0; i < maxLen; i++) {
              if (i < lockCount) out += paddedFinal[i];
              else out += (paddedFinal[i] === " ") ? " " : CHARS[Math.floor(Math.random() * CHARS.length)];
            }
            titleEl.textContent = out;
            if (t < 1) heroRafId = requestAnimationFrame(tick);
            else { 
              if (isReverting) titleEl.innerHTML = defaultTitleHTML; 
              else titleEl.textContent = finalText; 
              heroRafId = null; 
            }
          }
          titleEl.style.willChange = "contents";
          heroRafId = requestAnimationFrame(tick);
        }
        scrambleCards.forEach((card) => {
          const t = (card.getAttribute("data-title") || "").trim();
          if (!t) return;
          card.addEventListener("mouseenter", () => scrambleTo(t, { duration: 520, isReverting: false }));
          card.addEventListener("mouseleave", () => scrambleTo(defaultTitleText, { duration: 420, isReverting: true }));
        });
      }
    } catch (e) { console.error("❌ Erreur Section 1"); }

    // --- 2. PROJETS ---
    try {
      const projectCards = document.querySelectorAll(".project_card");
      if (projectCards.length) {
        const clearStates = () => projectCards.forEach(c => { c.classList.remove("is-active", "is-dimmed"); });
        projectCards.forEach((card) => {
          const activate = () => projectCards.forEach(c => { c.classList.toggle("is-active", c === card); c.classList.toggle("is-dimmed", c !== card); });
          card.addEventListener("mouseenter", activate);
          card.addEventListener("mouseleave", clearStates);
        });
      }
    } catch (e) { console.error("❌ Erreur Section 2"); }

    // --- 3. NAVBAR ---
    try {
      const links = document.querySelectorAll('[data-scramble="true"]');
      if (links.length && !reduceMotion) {
        links.forEach((el) => {
          el._textNodes = getTextNodes(el);
          let linkRafId = null;
          function scramble(duration = 220) {
            if (linkRafId) cancelAnimationFrame(linkRafId);
            const startTime = performance.now();
            function tick(now) {
              const t = Math.min((now - startTime) / duration, 1);
              el._textNodes.forEach(item => {
                const maxLen = item.original.length;
                const lockCount = Math.floor(maxLen * t);
                let out = "";
                for (let i = 0; i < maxLen; i++) {
                  if (i < lockCount) out += item.original[i];
                  else {
                    const c = item.original[i];
                    if (/\s/.test(c) || c === "[" || c === "]") out += c;
                    else out += CHARS[(Math.random() * CHARS.length) | 0];
                  }
                }
                item.node.nodeValue = out;
              });
              if (t < 1) linkRafId = requestAnimationFrame(tick);
              else { el._textNodes.forEach(item => { item.node.nodeValue = item.original; }); linkRafId = null; }
            }
            linkRafId = requestAnimationFrame(tick);
          }
          const reset = () => { 
              if (linkRafId) cancelAnimationFrame(linkRafId); 
              el._textNodes.forEach(item => { item.node.nodeValue = item.original; }); 
          };
          el.addEventListener("mouseenter", () => scramble(220));
          el.addEventListener("mouseleave", reset);
        });
      }
    } catch (e) { console.error("❌ Erreur Section 3"); }

    // --- 4. SCRAMBLE CONTINU & RÉSULTATS INTELLIGENT ---
    try {
      const triggers = document.querySelectorAll('[data-trigger-scramble]');
      const scrambleTargetsText = document.querySelectorAll('[data-target-scramble]:not([data-target-scramble="results"])');
      const scrambleTargetsResults = document.querySelectorAll('[data-target-scramble="results"]');
      const fadeTargets = document.querySelectorAll('[data-target-fade]');

      if (triggers.length && !reduceMotion) {
        
        // Préparation Textes Normaux
        scrambleTargetsText.forEach(target => {
          target._textNodes = getTextNodes(target);
          if (!target.dataset.lockWidth) {
            target.style.display = "inline-block";
            target.style.minWidth = target.getBoundingClientRect().width + "px";
            target.dataset.lockWidth = "true";
          }
        });

        // Préparation Textes Résultats (+50)
        scrambleTargetsResults.forEach(target => {
          target._textNodes = getTextNodes(target);
        });

        fadeTargets.forEach(target => target.style.transition = "opacity 0.4s ease");

        let continuousRafId = null;
        let isContinuousHovered = false;
        let lastFrameTime = 0;
        const frameInterval = 1000 / 20;

        function continuousGlitchLoop(currentTime) {
          if (!isContinuousHovered) return;
          if (currentTime - lastFrameTime >= frameInterval) {
            
            // Glitch Textes Normaux
            scrambleTargetsText.forEach(target => {
              target._textNodes.forEach(item => {
                let out = "";
                for (let i = 0; i < item.original.length; i++) {
                  const c = item.original[i];
                  if (/\s/.test(c) || c === "[" || c === "]") out += c;
                  else out += CHARS[Math.floor(Math.random() * CHARS.length)];
                }
                item.node.nodeValue = out;
              });
            });

            // Glitch Résultats (+50 intelligent)
            scrambleTargetsResults.forEach(target => {
              target._textNodes.forEach(item => {
                let out = "";
                let i = 0;
                while (i < item.original.length) {
                  // Si le code détecte un '+' suivi d'un chiffre
                  if (item.original[i] === '+' && i + 1 < item.original.length && /\d/.test(item.original[i+1])) {
                    out += '+'; // Garde le + intact
                    i++;
                    // Remplace tous les chiffres suivants par des chiffres aléatoires
                    while (i < item.original.length && /\d/.test(item.original[i])) {
                      out += DIGITS[Math.floor(Math.random() * DIGITS.length)];
                      i++;
                    }
                  } else {
                    // Sinon, scramble classique de lettres
                    const c = item.original[i];
                    if (/\s/.test(c) || c === "[" || c === "]") out += c;
                    else out += CHARS[Math.floor(Math.random() * CHARS.length)];
                    i++;
                  }
                }
                item.node.nodeValue = out;
              });
            });

            lastFrameTime = currentTime;
          }
          continuousRafId = requestAnimationFrame(continuousGlitchLoop);
        }

        const startTriggerActions = () => {
          isContinuousHovered = true;
          if (continuousRafId) cancelAnimationFrame(continuousRafId);
          requestAnimationFrame(continuousGlitchLoop);
          fadeTargets.forEach(t => { t.style.opacity = "0"; t.style.pointerEvents = "none"; });
        };

        const stopTriggerActions = () => {
          isContinuousHovered = false;
          if (continuousRafId) cancelAnimationFrame(continuousRafId);
          
          scrambleTargetsText.forEach(target => {
            target._textNodes.forEach(item => { item.node.nodeValue = item.original; });
          });
          scrambleTargetsResults.forEach(target => {
            target._textNodes.forEach(item => { item.node.nodeValue = item.original; });
          });

          fadeTargets.forEach(t => { t.style.opacity = "1"; t.style.pointerEvents = "auto"; });
        };

        triggers.forEach(trigger => {
          trigger.addEventListener("mouseenter", startTriggerActions);
          trigger.addEventListener("mouseleave", stopTriggerActions);
        });
      }
    } catch (e) { console.error("❌ Erreur Section 4"); }

  });
</script></body>
